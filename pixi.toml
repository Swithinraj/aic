[workspace]
name = "aic"
authors = ["Teo Koon Peng <koonpeng@intrinsic.ai>"]
channels = ["robostack-kilted", "conda-forge"]
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
conda-pypi-map = { "robostack-kilted" = "robostack_mapping.json" }
preview = ["pixi-build"]

[target.linux-64.dependencies]
evdev = ">=1.9.2,<2"

[dependencies]
isort = "==5.13.2"                                                                     # version bundled by the vscode extension
json5 = ">=0.13.0,<0.14"                                                               # version bundled by the vscode extension
opencv = "<4.13.0"
packaging = ">=24.2,<26.0"                                                             # required by lerobot==0.4.3
pyright = "==1.1.408"
ros-kilted-aic-control-interfaces = { path = "aic_interfaces/aic_control_interfaces" }
ros-kilted-aic-example-policies = { path = "aic_example_policies" }
ros-kilted-aic-model = { path = "aic_model" }
ros-kilted-aic-model-interfaces = { path = "aic_interfaces/aic_model_interfaces" }
ros-kilted-aic-task-interfaces = { path = "aic_interfaces/aic_task_interfaces" }
ros-kilted-aic-teleoperation = { path = "aic_utils/aic_teleoperation" }
ros-kilted-control-msgs = "*"                                                          # lerobot_robot_ros
ros-kilted-geometry-msgs = "*"                                                         # lerobot_robot_ros
ros-kilted-lerobot-robot-aic = { path = "aic_utils/lerobot_robot_aic" }
ros-kilted-moveit-msgs = "*"                                                           # lerobot_robot_ros
ros-kilted-rclpy = "*"
ros-kilted-rmw-zenoh-cpp = "*"
ros-kilted-ros-core = "*"
ros-kilted-sensor-msgs = "*"                                                           # lerobot_robot_ros
ros-kilted-std-msgs = "*"                                                              # lerobot_robot_ros
ros-kilted-std-srvs = "*"
ros-kilted-tf2-ros-py = "*"
setuptools = ">=71.0.0,<81.0.0"                                                        # required by lerobot==0.4.3
ros-kilted-team-policy = { path = "team_policy" }

[pypi-dependencies]
huggingface-hub = { version = "==0.35.3", extras = ["hf-transfer", "cli"] }
lerobot = "==0.4.3"
lerobot_robot_ros = { git = "https://github.com/koonpeng/lerobot-ros", rev = "b4a635fc5264266bd1575f07d54be3d4bbd620e0", subdirectory = "lerobot_robot_ros" }
lerobot_teleoperator_devices = { git = "https://github.com/koonpeng/lerobot-ros", rev = "b4a635fc5264266bd1575f07d54be3d4bbd620e0", subdirectory = "lerobot_teleoperator_devices" }
mujoco = "==3.5.0"
pynput = ">=1.7.6,<2"
pyspacemouse = ">=2.0.0, <3"
transformers = ">=4.49"
pillow = "*"
safetensors = "*"
trimesh = "*"
ultralytics = "*"

[activation]
scripts = ["pixi_env_setup.sh"]

[tasks.download_model]
description = "Downloads the Depth-Anything-V2 model locally if it doesn't exist"
cmd = """
python -c '
import os
from transformers import AutoImageProcessor, AutoModelForDepthEstimation

out_dir = "team_policy/models/depth_anything_v2_small"
if not os.path.exists(out_dir):
    os.makedirs(out_dir, exist_ok=True)
    print("Downloading model...")
    model_id = "depth-anything/Depth-Anything-V2-Small-hf"
    AutoImageProcessor.from_pretrained(model_id).save_pretrained(out_dir)
    AutoModelForDepthEstimation.from_pretrained(model_id).save_pretrained(out_dir)
    print("Model saved to " + out_dir)
else:
    print("Model already exists at " + out_dir)
'
"""

[tasks.test_depth]
description = "Runs the stereo depth node with Depth-Anything-V2 environment variables"
depends-on = ["download_model"]
cmd = "unset DEPTH_ANYTHING_V2_GPU_MIN_VRAM_GB && export DEPTH_ANYTHING_V2_MODEL_ID_OR_PATH=$PWD/team_policy/models/depth_anything_v2_small && export DEPTH_ANYTHING_V2_LOCAL_ONLY=1 && export DEPTH_ANYTHING_V2_DEVICE=auto && export DEPTH_ANYTHING_V2_GPU_MIN_VRAM_GB=2 && export DEPTH_ANYTHING_V2_MAX_SIDE_CPU=448 && export DEPTH_ANYTHING_V2_MAX_SIDE_GPU=700 && export DEPTH_ANYTHING_V2_MAX_INFERENCE_HZ=2.0 && export DEPTH_ANYTHING_V2_USE_FP16=1 && ros2 run team_policy test_stereo_center_depth && export YOLOV12_MODEL_PATH=$PWD/team_policy/models/yolov12.pt && export YOLOV12_DEVICE=auto && export YOLOV12_CONF=0.25 && export YOLOV12_IOU=0.45 && export YOLOV12_IMGSZ=640 && export YOLOV12_MAX_HZ=5.0"